<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本市区町村 位置当てゲーム</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="start-screen">
    <div id="start-card">
      <div id="start-title-wrap">
        <div id="start-title-badge">JAPAN MUNICIPALITY PIN QUIZ</div>
        <h1 id="start-title">日本市区町村 位置当てゲーム</h1>
        <p id="start-subtitle">地図をクリックして、全国の市区町村の位置感覚に挑戦。</p>
      </div>

      <div class="setting-row setting-row-featured setting-row-stacked">
        <label>難易度</label>
        <div id="difficulty-buttons" class="difficulty-buttons" role="group" aria-label="難易度">
          <button type="button" class="difficulty-btn" data-difficulty="beginner">初級</button>
          <button type="button" class="difficulty-btn" data-difficulty="intermediate">中級</button>
          <button type="button" class="difficulty-btn" data-difficulty="advanced">上級</button>
        </div>
        <div id="difficulty-note" class="setting-note">個別に変更するとカスタム設定になります</div>
      </div>

      <div class="setting-row setting-row-stacked">
        <label for="setting-rounds">問題数</label>
        <div class="slider-row">
          <input type="range" id="setting-rounds" value="5" min="1" max="30" step="1">
          <span id="setting-rounds-value" class="setting-value">5問</span>
        </div>
      </div>

      <div class="setting-row">
        <label for="setting-prefecture">都道府県名</label>
        <select id="setting-prefecture">
          <option value="auto">同名の市区町村のみ表示</option>
          <option value="always">常に表示</option>
        </select>
      </div>

      <div class="setting-row setting-row-stacked">
        <label for="setting-timelimit">制限時間</label>
        <div class="slider-row">
          <input type="range" id="setting-timelimit" value="0" min="0" max="120" step="5">
          <span id="setting-timelimit-value" class="setting-value">なし</span>
        </div>
        <span class="setting-unit">秒 / 0 でなし</span>
      </div>

      <div class="setting-row setting-row-toggle">
        <label for="setting-kana">ふりがな表示</label>
        <select id="setting-kana">
          <option value="on">ON</option>
          <option value="off">OFF</option>
        </select>
      </div>

      <div class="setting-row setting-row-toggle">
        <label for="setting-hints">ヒント表示</label>
        <select id="setting-hints">
          <option value="on">ON</option>
          <option value="off">OFF</option>
        </select>
      </div>

      <div id="setting-hintcount-row" class="setting-row setting-row-stacked">
        <label for="setting-hintcount">ヒント回数</label>
        <div class="slider-row">
          <input type="range" id="setting-hintcount" value="2" min="1" max="5" step="1">
          <span id="setting-hintcount-value" class="setting-value">2回</span>
        </div>
      </div>

      <button id="start-btn" disabled>読み込み中...</button>
    </div>
  </div>

  <div id="header">
    <div id="round-info">第 <span id="current-round">1</span> / <span id="total-rounds">5</span> 問</div>
    <div id="logo">位置当てゲーム</div>
    <div id="score-display">スコア <span id="total-score">0</span></div>
  </div>

  <div id="question-banner">
    <span id="municipality-name">読み込み中...</span>
    <span id="prefecture-hint"></span>
    <span id="timer"></span>
  </div>

  <div id="map-container">
    <div id="map"></div>

    <div id="instruction">地図をクリックしてピンを置いてください</div>

    <button id="confirm-btn" class="hidden">ここに決定</button>
    <button id="hint-btn" class="hidden">ヒントを使う</button>

    <div id="result-panel" class="hidden">
      <div id="result-left">
        <div id="result-distance"></div>
        <div id="result-guess"></div>
        <div id="result-label"></div>
      </div>
      <div id="result-points-wrap">
        <span id="result-points"></span>
        <span id="result-points-unit">pt</span>
      </div>
      <button id="next-btn">次の問題へ →</button>
    </div>

    <div id="game-over" class="hidden">
      <div id="game-over-card">
        <div id="final-msg"></div>
        <div id="final-score"></div>
        <div id="final-pct"></div>
        <button id="back-to-settings-btn" class="secondary-action">ルール設定に戻る</button>
        <button id="restart-btn">もう一度プレイ</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
